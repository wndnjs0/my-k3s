global:
  domain: argocd.jmly.me
configs:
  params:
    server.insecure: true
controller:
  metrics:
    enabled: true
redis:
  exporter:
    enabled: true
server:
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
    hostname: argocd.jmly.me
  metrics:
    enabled: true
repoServer:
  metrics:
    enabled: true
applicationSet:
  metrics:
    enabled: true
notifications:
  enabled: false
dex:
  enabled: false